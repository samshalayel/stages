<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمات تجميل الحيوانات الأليفة</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #FFFAF0;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        header {
            background: #FFB6C1;
            color: #fff;
            padding-top: 30px;
            min-height: 70px;
            border-bottom: #FF69B4 3px solid;
        }
        header a {
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 16px;
        }
        .card {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.1);
            margin: 20px;
            padding: 20px;
            transition: transform 0.5s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }
        .services, .gallery, .testimonials {
            margin-top: 30px;
        }
        footer {
            background: #FFB6C1;
            color: #ffffff;
            text-align: center;
            padding: 10px 0;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>خدمات تجميل الحيوانات الأليفة</h1>
        </div>
    </header>

    <div class="container">
        <section class="services">
            <h2>خدماتنا</h2>
            <div class="card">
                <h3>حزمة العناية الكاملة</h3>
                <p>عناية شاملة مع حمام وقص الأظافر.</p>
            </div>
            <div class="card">
                <h3>حزمة التنظيف السريع</h3>
                <p>تنظيف سريع مع العطور الخاصة للحيوانات.</p>
            </div>
        </section>

        <section class="gallery">
            <h2>معرض الحيوانات</h2>
            <img src="https://via.placeholder.com/400" alt="صورة حيوان">
        </section>

        <section class="testimonials">
            <h2>آراء العملاء</h2>
            <div class="card">
                <p>"كانت التجربة رائعة! سيحب حيوانك الأليف كل دقيقة هنا." – مي أحمد</p>
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2023 خدمات تجميل الحيوانات الأليفة</p>
    </footer>
</body>
</html>
